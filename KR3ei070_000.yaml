照原單開出能服二料其功無窮至所云神咒亦不甚解姑存其說大棗一斤蓮肉四兩芡實四兩甘草三錢小紅棗二斤薏苡仁四兩大茴香五錢白洋糖斤半白菊花四兩黑芝麻半升小茴香五錢煉蜜為丸如龍眼大每日空心服一丸滾白湯下忌生冷先虔誦文殊菩薩神咒一遍後服此丸男女俱服神咒噓靜不可思議境了無容存發機斷一性希無分無合不即不離咄咄咄音篤咦咦咦音移無住大定沒那移清淨本然絶變易恆無染著自恬如常泯終始頓徹端倪般若音鉢惹妙悟永如如咄噓金鎖玉連環當歸二兩熟地黃二兩川牛膝二兩鎖陽一兩五錢厚杜仲二兩薑汁炒去絲枸杞子二兩白茯苓二兩山茱肉二兩懷山藥二兩石斛一兩五錢天門冬一兩五錢麥門冬一兩五錢去心防風一兩五錢真羌活一兩五錢陳皮一兩五錢去白知母一兩五錢酒炒白朮朝東壁土炒一兩五錢龍骨火煅一兩五錢紫霄花一兩五錢黃耆一兩五錢蜜炒淫羊藿剪去邊羊油炒一兩五錢甘草五錢蜜水炒上好肉桂一兩五錢厚黃柏五錢酒浸炒五味子揀去梗五錢巴戟去骨二兩五錢牡蠣酒煅一兩破故紙五錢紫桑椹二斤圓眼肉八兩肉蓯蓉二兩五錢酒洗去甲上藥制過絹袋盛之裝入壇內放上好燒酒五十斤浸之夏浸七日冬浸二十一日春秋浸半月方用可早午晚三次量飲藥渣濾出曬乾為末煉蜜為丸如桐子大每早空心服三錢淡鹽湯送下忌食牛犬延年育子不可限量其功周王百子丹黃金切莫傳白玉休輕換名為無價寶方號養生丹識者同觀覽有價難回換功成萬萬般添腎水助元陽用一味破故紙肉蓯蓉人參為伴乾山藥蓽澄茄巴戟同鑑何首烏蒸曬二三遍川椒去白金墨除煙炒去煙山茱萸取肉須用川續斷當歸酒浸須用心茯苓蒸遠志浸益智同然共細辛泡陳皮入青鹽各味平稱細研煉蜜為丸如獨蒜鹽酒清晨服一丸常服二七身康健保養身全此方名喚一枝花養得靈龜粗大堅夜三女能周戰破故紙肉蓯蓉人參山藥蓽澄茄巴戟何首烏川椒金墨山萸肉川續斷當歸身茯苓遠志肉益智仁細辛陳皮青鹽以上各一兩暖腰神方淫羊藿四兩破故紙花椒蘄艾各二兩俱為粗末或絹或緞照暖腰式做成行藥兼絲綿橫直行之毋使走移縛腰中四十以前半月見功五十以後一月見效長龜方小茴香八錢柏子仁一兩二錢白朮黑附桂心炮姜各八錢共為末空心溫服二錢日三服七日不能容移心至寶丹用天王補心丹一丸入房時左手緊緊捏著須去指甲方能捏得嚴密若泄氣則不驗矣須護以銀盒鄭重其事則心有所注火不易泄自然堅固長久妙極內服補中益氣湯加肉蓯蓉枸杞子更妙如不用移心至寶丹即單服益氣湯亦可
