body:
  text: 正文徐果亭先生試驗神方松子柏子韭菜子牛蒡子蛇床子女貞子菟絲子棗仁子大附子用童便浸三日刮去皮曬乾銅刀切棉花子以上等味各四兩研為細末用大麥一石洗淨搗去皮殼將藥分作十份每麥一斗用藥一分拌勻將小母雞十隻雄雞一隻作一籠罩住不令閒走將藥末所拌麥略濕餵養待其生蛋每服三枚用藥酒送下服之兩月必然有孕雞用一月外者送蛋藥酒方男人服麥冬天冬當歸人參生地茯神以上六味各五錢用陳黃酒十斤將藥用絹袋包入壇內重湯煮三炷香為度父時母地種子法專以父年為例男女俱雙月生者雙月入房單月生者單月入房男單女雙者用單月男雙女單者用雙月妙種子紅藥連城丸罌粟花二兩米泔水浸排草五錢桔梗六錢枸杞子五錢吳茱萸八錢廣木香五錢甘松五錢三奈八錢川椒一兩三錢干桂五錢鴉片四錢浸少許拌勻浸蟾酥二錢研末人乳泡母丁香五錢打碎另包同藥浸一宿取起蛤蚧一對剪碎研末火酒四兩浸透以上各藥先用甜水浸一宿次早將藥併入銅鍋內煎熬滾透不時取起必候川椒白色為度然後將藥渣用絹濾去淨其藥水再入鍋內熬至成膏即入鴉片蛤蚧原浸之火酒共入熬少片時納成膏再入酥不可久熬將煎過濾出蛤蚧丁香渣焙乾研極細末入膏藥內丸如緑豆大硃砂為衣此丸能種子堅固久戰不泄用時將燒酒或吐津化開先一二時搽龜莖行事溫水洗去入爐妙難盡述老奴丸一名蒼龍丸此方服起止可用五六分此方成都府崔磨玉無子欲服此藥修合未服而死有老奴七十以上腰腳疼痛曲脊而行褚氏與此藥服之其老奴語褚氏曰自服此藥深有靈驗諸疾悉痊房事如少壯之人於是與褚氏通焉後有孕一日褚氏事露其家母親視之切究其由得其實道打死此老奴因折其腿骨髓漏皆如金色多試有驗是名老奴丸此藥專助陽事如欲解者飲涼水三口年高氣衰虛耗風濕腰腳疼痛並宜服之最為靈驗添精補腎虛去冷除風濕扶衰更起陽虔誠好修合祕密莫傳揚假之保元氣延壽得安康一方無桑螵蛸當歸沉香木香五錢燈草二錢大蜘蛛七個胡桃肉另研蓽澄茄車前子炒馬蘭花酒浸牡蠣大鍛萆薢韭子木通以上各一兩山萸肉去核補骨脂酒浸桑螵蛸酒浸全蠍去毒龍骨以上各一兩母丁香紫霄花肉蓯蓉酒浸菟絲子酒蒸蛇床子白茯苓去皮仙靈脾八角茴香巴戟去心遠志肉去心當歸以上各二兩沉香七錢乾漆炒去煙三兩熟地黃五兩上藥煉蜜為丸如桐子大每服三十丸空心溫酒送下七日見效如無婦人者勿服一方有五味子無燈草又種子奇方須擇壬子吉日在於山中修合忌婦人雞犬見兼帶春意如不欲子不必擇日亦不必忌此方乃福建福州府陳尚書七十無子罄將萬金家財濟貧救危一日悶坐檐下思無兒繼後不覺淚流忽見一老者皓首童顏從中門而進告曰愚老特送種子奇方至其宦答之吾陽事久不舉矣總有妙方服之無益老者云此藥專助陽補精名為助陽益母丸用之必添貴子乞請試之其宦忙進取銀十兩相謝一時不見老者以為怪即便照方試用果然連得四子皆為顯官此乃濟貧積德之感報也藥共十一味各等分俱為細末煉蜜為丸如白豆大候婦人經水淨一日將一丸納於陰戶半時辰藥已融化陰精未盡心花已開又將一丸以津塗玉莖上然後交感陽物長大堅硬比向倍戰男婦爽快妙難盡述無有不受孕者也此藥兼治婦人白帶小腹冷痛男子夢遺可止陽萎可興大有功效但得此方非易余刊濟世辛珍重之求子者保養一月倘興期不正另按脈調經經正方效藥味開後菟絲子蛇床子番木鱉子白芨砂仁肉桂杏仁川椒吳茱萸細辛母丁香每味三錢可合菟絲子不為末煮爛搗在藥末內種子金丸此方治婦人血淋白帶陰瘡陰蝕蟲並解楊梅瘡毒每一次用一丸去臘皮納入陰戶如欲種子須候行經將淨後連用一二服即便住手恐已受胎反忌香氣如月經停須防受胎不可再用倘經又至後再如前法如有別用不妨再投樟腦六兩用瓦三塊分三處放炭火上候煙吐即移下換易成霜用六錢蘇合油一兩麝香三錢高良薑五錢官桂三錢水安息五錢蛇床子不拘多少將水安息麝香蘇油三物研爛極細加入諸藥用煉蜜為丸如黃豆大用蠟封之種子金丸從來艱於生子每服熱藥故不惟身受熱毒且生子多患血熱腸此方參附為君佐以和暖祛毒每日不論感與不感不拘酒水磨少許抹陽上臨事溫水淨去或納些臍中藥性溫暖用必日久月長方使真陽漸旺丹田壯者強痿者起種子祛毒實有神功每錠重五分可用十餘次天兼治蠍蟲蜈蚣咬傷塗患處即愈又治水瀉痢疾神效塗臍內少許人參一兩當歸一兩與參合煎濃膏蟾酥一兩川附子一兩蘇合油一兩母丁香一兩川烏五錢草烏五錢輕粉五錢山豆根三錢蛇床子五錢真龍骨二錢色紅者佳將藥再篩為細末參歸膏和成錠子如干用白芨末煎膏濕加蛇床子末不拘多少如意線方川椒五錢白芷五錢罌粟殼一錢五分黃柏一錢五分官桂錢半麝香二分五釐蟾酥八分用人乳化開先將桂芷椒罌用火酒二湯碗煮透以椒無辣味為度將粗白絲線八錢沒藥汁內煮半乾取起照後入麝香黃柏酥和勻覆沒線浸之取起聽其陰乾再浸再幹以汁完為度臨用一二時前或燒酒或津液潤之縛莖上臨行去之一線可用二次解欲婦人津液嗌下即解其線用一尺長房術乳香沒藥各五錢蟾酥蔥汁拌肉桂鎖陽各三錢大附子五錢冰片三分將蟾酥用蔥汁蒸化為末丸如緑豆大臨用紙包一丸入腰褲內暖氣賴之用津吐化搽龜頭上一二時熱湯淨之入爐長龜方小茴香二錢桂心二錢柏子仁三錢黑附二錢白朮二錢每一日酒服三次重二錢止服七日不可再服祕傳壯陽固精酒奇妙方淫羊藿一斤剪邊去毛羯羊尾大者連肉重一斤頭鍋滴花燒酒十斤先將羊油四兩細炙羊藿共入壇內用箬封口扎緊重湯煮一日夜即一周時取出入泥壇內埋七日出火毒每黃昏時飲一杯入房交媾通宵金槍不倒玉莖便如鐵固精不漏如神種子易長真神妙方也滌痿興陽湯肉蓯蓉二兩肥大者陽起石研末一兩要雲頭兩腳鷺絲毛者仙靈脾二兩三奈子二兩大附子一個重一兩餘者皮臍俱去官桂二兩肉桂尤妙蛇床子一兩大茴香一兩韭菜子二兩木通五錢補骨脂二兩真川椒去目揀淨一兩前藥和勻作粗末分作十帖每帖用水二杓煎十數沸去渣加麝香五釐乘熱浸洗玉莖良久每日洗三四次十日後自然奇妙異常安息香聞香起馬方真鴉片一錢檀香二錢毛香二錢麝香五分風仙子一錢白頸蚯蚓七條螻蛄七個榆樹皮末一兩上用黃雄狗腎拌勻做成安息香點之聞者皆舉治腰痛神方當歸身一錢酒洗川芎一錢白芍藥一錢懷熟地一錢金櫻子一錢淫羊藿一錢去邊大石斛一錢四分杜仲薑汁炒斷絲一錢牛膝一錢一分人參不拘枸杞子一錢八分川仙茅一錢制遠志肉一錢杏仁一錢炙甘草一錢白茯苓一錢如腰痛岔氣倍加杜仲腿疼加牛膝一連服十劑間一日又服一劑以後每月服六劑五日一服補腰益腎壯元陽補血氣聖方菟絲子酒浸蒸曬一兩五錢枸杞子酒洗一兩五錢白芍藥酒炒二兩懷熟地一兩懷生地一兩當歸身一兩酒洗軟黃耆一兩生用黃柏八分韭子一兩白茯神一兩去骨焙遠志肉一兩去心甘草煮山萸肉一兩廣陳皮一兩去白上為末酒打麥糊為丸如桐子大空心每服一錢五分淡鹽湯送下治男子諸虛百損五勞七傷暖丹田添精髓壯元陽滋腎水種子之仙方也用菟絲子不拘多少酒浸蒸一晝夜用好酒時時灑蒸爛取出搗成膏為餅焙乾為細末用雀卵清為丸如桐子大每日七十丸空心好酒送下年至五十及痿者每菟絲子末一斛加天雄四兩以麥裹火鍛熟削去皮臍切成四片童便浸透慢火焙乾入菟絲子末同服之尤效補腎種子丸兼治中脘疼虛弱生地八兩研砂仁入酒九蒸九曬丹皮三兩酒蒸五味子三兩歸身三兩酒洗淮山藥四兩乳拌多次蓮蕊五兩枸杞子四兩茯苓三兩去皮乳拌肉蓯蓉四兩酒洗竹刀刮去毛甲魚鰾六兩蛤粉炒菟絲餅四兩酒蒸鹿膠五兩酒化入蜜山萸肉四兩煉蜜丸桐子大每晨服三四錢製藥勿用紹酒用三白豆酒花露酒九靈丹此藥滋陰固腎理脾清金種子益壽虛勞者至寶藥性和平常宜服之一治靈龜不振二治振而不實三治實而不勇四治勇而不威五治威而不堅六治堅而不久七治久而精寒八治寒而無子九治有子不齊白茯苓要極堅厚者為末水飛二次去筋膜用人乳浸曬夜露七次焦乾二斛足懷生地肥大者酒浸蒸如黑漆人乳浸曬九次曬乾一斛足天門冬肥大透明者去心淨酒浸九次曬乾一斛足用黑鉛十斛煉至一斛入桐油半斛又煉至半斤入雄黃一兩川椒五錢附子一兩共為細末同煉淨鉛傾成圈子用上好燒酒十斛土茯苓淫羊藿雄黃硫黃各二兩母丁香五錢鴉片五錢蓯蓉附子各二兩共為細末同酒煮圈子酒干為度用麝香一匕用之梅香春意足鴉片三分蛇床子五分赤肉桂三分陽起石五分胡椒三粒麝香半分以上六味研極細末津調搽莖處每次用一分壯精丸此方不舉者能舉不堅者能堅不大者能大不固者能固初服只可一二錢乃養龜之法如欲行房先一二時以火酒送下三錢即堅大無比如忌火酒即老酒亦可懷熟地三兩人乳酒蒸懷生地一兩酒煮懷山藥三兩人乳拌枸杞子三兩杜仲三兩酒醋鹽炒覆盆子三兩酒炒淫羊藿三兩羊酥炒川巴戟二兩酒蒸厚赤肉桂二兩蛇床子二兩北五味一兩砂仁一兩五錢鎖陽二兩芡實二兩五錢蓮鬚二兩五錢山萸肉三兩陽起石二兩蓯蓉四兩酒洗去鱗甲酒煮川附一個重一兩二錢先將甘草水煮熟後用童便煮至肉無白星方可入藥上將諸藥俱焙乾研極細末用蜜三斛煉為丸如桐子大每服空心送下其效如神七制補骨脂不老方制時用三伏龍陽氣曬時用米篩安絹下放水缸取坎離交養之義非泛泛房術比也補骨脂一斤插去薄衣曬七日一次用糯米一升浸泔平浸一宿漉起曬七日乾二次用黃柏二兩煎濃汁去渣存汁浸一宿漉七日乾三次用杜仲四兩或用半斤煎濃汁浸一宿曬七日乾四次用青鹽二兩研碎將骨脂搗成細末和曬七日乾五次用胡桃肉半斛搗爛將故紙拌勻曬七日乾六次用上白魚膠半斛切寸用蛤粉一兩拌炒成珠播淨和前藥曬七日七次用白蜜二斛將前藥和勻搗千杵丸如桐子大清晨每用淡鹽湯初用二錢後漸三錢如覺燥用鱉雄雞湯潤之七日見效陽氣發生須保養百日則先天正氣接續不窮固精壯陽種子不老功效無比不可輕傳丸後須用瓷瓶貯放濕地七日可服搖鞭丸治陽物久倒不起或思慮過度或因血氣不足不起此方驗過用馬戶物一根一尺一寸者佳分為十一寸瓦上焙乾為末放在床上挨身之下放十一日外此末有二兩加沉香一錢威靈仙一兩覆盆子一兩共為末燒酒打糯米糊丸如棗核大空心六七丸滾水下延壽獲嗣仙方鹿茸為君味甘酸又云苦辛氣溫無毒活血散淋治癰腫骨疽療虛勞羸瘦四肢腰脊痠疼腳膝無力小便利男子泄精女子崩中赤白帶下角味鹹氣溫主惡瘡癰腫留血在陰中小腹急痛腰脊痛折傷惡血尿血婦人夢與鬼交取末和酒服即出鬼精鹿角膠和骨髓蜜煮壯陽令有子肉氣溫補中益氣腎補中壯陽用鹿角二十斤新鮮嫩色者佳鋸草段劈開以水泡三四日刷盡黑泥盛錫瓶內扎口懸胎重湯煮三日夜取起泡取淨汁入銅鍋內緩火久熬即成膏矣熬膏開後真川仙茅一斤粟米水浸一宿木甑蒸一炷香如此三次以黑為度味辛氣溫有毒米泔水浸去汁用忌鐵器及牛乳黑牛肉主腳腰風冷攣痹不能行丈夫虛勞老人失溺益陽道助筋骨人參一斤去蘆切碎君味甘氣溫微寒無毒反藜蘆安神定魄止驚悸生津通血脈治五勞七傷虛損肺脾陽氣不足虛喘乏力肺寒宜用之肺受火邪咳嗽者禁用天門冬一斤去心君味甘苦氣平大寒無毒凡用去皮心治肺氣咳逆喘急消痰通腎氣止渴療肺痿生癰吐膿血熱侵肺吐衄妄行瀉肺火利小便冷而能補枸杞子一斤去蒂味甘氣微溫無毒主熱中消渴堅筋骨強陰益精血明目療皮膚骨節間風及風眼赤痛麥門冬一斤去心君味甘微苦氣平微寒無毒治口乾渴心肺熱虛勞客熱通脈保神補心氣治血妄行瀉肺中伏火療肺痿吐膿真黃精一斤竹刀切片蜜水洗淨木甑蒸一柱香忌鐵器味甘氣平無毒益脾胃潤心肺除風濕補勞傷上六味共一處均作四分每分藥二十四兩次用水十二斤煎熬約有一半時將渣撈起再用水六斤煎熬一半候汁取完將渣搗爛入滾水內泡扭去渣方將三合汁銅鍋內文火漫浸成膏瓷器盛之聽用為丸末藥開後大生地十二兩酒浸一宿用益智仁二兩拌勻砂鍋木甑蒸一柱香去益智仁君味甘苦氣寒無毒忌鐵器萊蔔地黃微溫大補血衰滋腎陰益氣力主血虛勞熱産後臍腹痛生地大寒涼血生血補腎水真陰不足主婦人崩中不止及産後血上薄心胎動下血瘀血衄血吐血胃寒者斟酌用痰膈不利者薑汁炒用制淨只用八兩懷山藥四兩炒臣味甘氣溫平無毒長肌肉止腰痛滋陰補心肺不足療煩熱澀精治健忘生芡實四兩撿淨炒味甘氣平無毒主溫痹腰脊膝痛補中益精氣強志覆盆子四兩去蒂酒蒸臣味甘氣平微熱無毒主男子腎虛精竭陰痿又能令發不白女子食之有子真沙苑蒺藜四兩酒蒸君味苦辛氣溫微寒無毒治風明目破惡血療喉痹乳難身體風癢肺痿小兒頭瘡止遺瀝泄精溺血菟絲子淘淨四兩酒蒸搗君味辛甘氣平溫無毒療虛寒腰痛膝冷補精強陰堅筋骨治莖中寒精泄尿血以上六味滋養真陰益腎生精白茯苓四兩去木臣味甘淡氣平無毒柏子仁紙包壓去油四兩君味甘辛氣平無毒用扁葉者名側柏主驚悸益氣血治恍惚虛損腰重痛潤腎燥去頭風興陽道山萸肉五兩酒洗微焙味酸澀氣平微溫無毒凡用去核能澀精補腎興陽堅莖添精止小便暖腰膝療耳鳴止女人月水不定老人尿不節以上三味培心經不足之血瘕山萸榮肝而心血始生肉蓯蓉嫩肥大者酒洗去鱗甲及內白滷新瓦焙乾取末三兩味甘酸氣微溫無毒強陰益腎暖腰膝續筋髓補命門相火治男子絶陽不興泄精尿血遺瀝女子絶陰不産血崩帶下陰痛補骨脂鹽水浸一宿黑芝麻同炒去麻三兩主四肢疼痛骨髓傷敗陽衰腎冷精流腰膝痛囊濕及婦人血氣按二味假鹿膠仙茅之力益命門真陽之精牡丹皮四兩酒拌炒主虛勞骨蒸瀉陰火除癥堅瘀血留腸胃不散衄血吐血女子經脈不通血瀝腰疼産後一切冷熱血氣療癰瘡排膿止痛浮小麥取淨末四兩炒除熱止燥渴利小便養肝氣治暴淋止盜汗治骨蒸肌熱女人勞熱以上二味清醒胃氣毋令一毫混雜邪氣存蓄於中使補血生精益氣等藥盡復於本源矣何首烏竹刀刮去皮切片黑豆煮汁拌蒸焙乾四兩忌鐵器雄者赤雌者白須雌雄並用主瘰癧消癰腫療頭面風及腰膝痛益血氣黑鬚發長筋骨補精令人有子女貞實去皮酒拌蒸焙乾四兩補中養精神蜜酒拌九蒸九曬服之黑鬚發以上二味滋養真陰烏須烏髮以上共為細末用前鹿角膠十兩藥膠十八兩頓開攪勻和蜜為丸如桐子大每早百丸用太極膏調湯送下服此丸以補先天之不足晚服資生丸健脾消導熬太極膏方開後人參一斤枸杞子一斤天冬一斤麥冬一斤生地一斤金叉石斛一斤酒洗另熬汁三次去渣入藥汁同熬成膏能壯筋骨療腳膝軟弱強陰益精長肌肉治胃中虛熱皮膚邪熱前五味共一處均作四分熬汁三次存汁於甕渣搗爛入滾水內鈕汁候完入鍋內緩火慢熬成膏收入瓷罐內每早任意用一二匙黃酒化開或滾水亦可服前丸藥丸藥內加川斷三兩酒浸用調血脈療金瘡癰腫止痛生肌續筋骨治婦人乳難産及崩中漏血腰痛小便縮泄精溫小宮張真人祈子法蘇老泉曰洵嘗於天聖庚午年重九日至玉局觀無礙子卦肆中見一畫像筆法清奇云乃張仙也凡人乏嗣者求之有感必應因解玉環易之洵此時尚無子嗣每日露香以告求之四年乃生軾又二年生轍性皆嗜書乃知真人急於接物而無礙子言不妄矣故識其本末使後之祈子者於此加敬云眉山蘇洵謹識一祭品用細糯米粉團如彈子大煮熟染五者青黃赤白黑五般棗湯三盞茶湯三盞果三品酒三盞鹿脯一方香一爐燭二炬如無鹿脯以羊代之祭文一通紅紙書之黏板上置於香案祭畢揭焚之祭期用春秋上旬吉日或祭丁日亦可一祭儀擺列齊整須夫婦列拜先行四拜禮詣香案前三上香三進酒禮拜真人寶誥七遍志心皈命禮文昌示化嗣録典官伏羲升錢感老人之鐵彈西湖垂釣得度世之仙方邪魔見彈以藏蹤疫癘聞風而遠殄咸池無犯天狗何傷禱應眉山兆三蘇之靈裔法傳雷杼周四目之神君嗣求永賴以綿長宗派因之而不絶有求必應無顧不從大慈大悲大仁大孝靈應祖師廣恩錫嗣白鶴得道真人拜完取告文跪讀訖置於香案再拜四禮揭告文於香爐內焚之俯伏叩三首起作揖而退一告文式維某年歲次某甲某月某日某人敢昭告於真人曰惟神好生化行四海某忝居末品艱於嗣息謹依遺教瞻奉尊顏仰望神慈曲從愚顧謹依品儀用申告祭尚響若得子而祭則改仰望為仰賴曲從為曲遂告祭為報祭真人惟尚淡不用錢馬補腎仙方菟絲子一斤山藥四兩枸杞子四兩煉蜜為丸神效種子丸遵方修合服之必有孕吳茱萸白芨白蘞白茯苓各一兩牛膝細辛各五錢菖蒲白附子當歸三錢厚朴桂心人參各四兩乳香三兩去油沒藥四兩上擇壬子日修合煉蜜為丸如紅豆大每服十丸空心好酒送下男子服之補精益氣孕婦服之即生雙胎無夫者不可服禿雞丸四川太守七十無子服之連舉三子其妻陰痛憎藥之功撇撒於地公雞食之每日狎雌雞數十次頭毛皆禿故名肉蓯蓉酒浸蛇床子五味子遠志肉蓮蕊木香山藥沉香益智各一兩蜜丸如桐子大空心酒下三十丸降珠丸黃天官妾年草七歲服藥二十七天有孕余藥送同僚秋侍郎妻年三十四歲服之一月有孕魏檢討妻年四十服之四十日有孕秦艽桂心杜仲防風厚朴各三分牛膝沙參乾薑製半夏白蘞各五錢附子白茯苓各一兩五錢人參一兩細辛一兩一分蜜丸緑豆大每服三十丸空心米湯下有孕勿服陰賊方母丁香麝香乳香去油沉香等分為末上藥津吐為丸如桐子大每用一丸入陰戶一丸入馬口進爐少住一二刻行事如意又方五倍子遠志各二錢蛇床子三錢各為末以二三釐津塗玉莖入戶而行不必解金玉連環遠志蛇床子紫霄花鴉片肉桂細辛起陽石各二錢麝香五分川附制鎖陽鵝油炙母丁香各三錢蔥汁浸蒸川蛤蚧一對頭尾俱全蟾蜍酥人乳制過一錢海狗腎一個雲南蟲兩對上各研極細末煉蜜丸如梧子大石青為衣用法申時吐津調化搽在龜頭玉莖上待乾方可行走臨時溫水洗去藥末入爐暫停一會而行每用半丸不用解如意丹官桂木鱉子去油白礬七分上藥各一錢水五碗煎三碗男女俱洗莖戶而後舉動又方母丁香子丁香俱曬乾為末各一錢鴉片藏腰邊待乾蟾酥切片火酒半鍾浸三日各五錢冰片淫羊藿一錢酥制羊油亦可麝香五分為末蔥姜各汁三匙上將蟾酥研爛夾水煮一炷香次下母子丁香淫羊藿再夾水煮三滾然後下鴉片麝香再煮一滾將干方下蔥薑汁待滾下冰片離火攤油紙上曬乾入瓷瓶內封固不可出氣每用一釐同時日中以火酒一匙研化搽上待乾而行走臨干時必須以溫水洗淨莖上之藥然後入爐一方加金櫻子三錢一方加龍骨二錢在內又方海螵蛸赤石脂遠志肉炒各一錢沙苑蒺藜炒二錢草烏九分麵包裹煨蛇床子炒二錢以上俱先下石燕蛤蚧各一對火酒煅五次紫霄花炒木鱉子去殼龍骨火酒煅蓮蕊各三錢陽起石火酒煅一次鎖陽炒牡蠣鍛各二錢以上第二次下桂心一錢蚯蚓瓦上焙燥鴉片各二錢晚蠶蛾四對焙母丁香曬乾為末淫羊藿酥油制各三錢以上第三次下蟾酥五錢燒酒一鍾浸三日研碎雄狗膽一個入麝二錢攪勻懸風中七日為度冰片二錢以上各藥俱為極細末先將蟾酥傾入白飯碗內夾水煮一滾將各藥依次而下煮數滾再加蔥薑蒜汁各三匙待滾放方離火攤油紙上如香茶搽陰乾收瓷瓶內不可出氣每用一釐悉照前方之法暖臍膏陽起石蛇床子香附子韭菜子硫黃麝香大楓子肉各五分土狗七個去翅羽炒蜜丸豆大油紙封臍內欲泄則去之種子金丹地龍即蚯蚓要白頸者為雄三條去泥曬乾細辛一錢研炒紫霄花一錢研曬乾母丁香五分曬乾研訶子肉一錢龍骨一錢雄二蠶蛾七個去翅足尾尖者為雄肉桂一錢蟾酥一錢酒浸曬蛇床子一錢仙茅曬乾一錢胡椒十粒淫羊藿一錢生附子一錢曬乾為末燒酒為丸黃蠟為衣申時用燒酒調化擦陽物莖上晚熱水洗去一粒可用二次不用解忌燒酒吃則痿而不泄也固陽丹荊芥乾薑艾葉柏子仁棗仁甘草益智仁枸杞各等分研極細末每服三錢只服七日又方紫霄花官桂母丁香研細末各二分津塗莖上甚久長又方白枯礬乾薑蛇床子狗骨灰胡椒各二分研末津調塗莖上又方以六七年種韭菜地上掘出蚯蚓以新瓷碗底用竹片圈之將蚯蚓入內上用麻布蓋之又以輕粉篩在上面則蚯蚓出汗而自死即以蚯蚓曬乾為末搽龜頭上久而自泄又方一粒丁香八粒椒細辛龍骨海螵蛸蟾酥豆大一粒兒二八佳人擺折了腰一次用三釐各等分津吐塗莖上出爐自解固堅散附子三錢母丁香蟾酥各二分麝香一分鴉片一分紅頭頸蚯蚓五條瓦上焙乾上為末津調搽莖上二三分強壯丸母丁香三分樟腦一錢土狗三個去足羽炒獨蔥一個去皮麝香一錢金絲木鱉一個去皮油硫黃一錢共為末入芋艿內同蕎麥麵裹之於糯米飯上蒸熟取出搗爛為丸如桐子大每用一丸入臍內以膏貼之待藥行自舉而後戰戰久煩厭去藥則泄矣第一妙錠真川附焙乾川烏炒各一兩草烏明雄蘇合油各五錢紫霄花五倍子山茨菰大厚肉桂蛇床子金絲木鱉去油各三錢母丁香蟾酥水安息各八錢共為細末以白芨熬膏和藥入臼內搗千杵為度印為錠子每用時先於午刻酒磨二三釐搽頭莖內待其自干不得走擦至晚將欲行事必須洗去此第一妙藥非比尋常臨陳自知其妙不可形容楊妃不寐方蓽茇五分北細辛六分黃丹三分川椒四分麝五釐飛礬一分蛇床子一錢七味研極細末蜜丸如黃豆大嵌入馬口送入陰戶然後行事不惟耐久更能種子益腎丸沉香乳香去油沒藥去油菟絲子各五錢小茴香一錢破故紙五錢酒浸核桃四十個去殼共為末煉蜜為丸如桐子大空心酒下三錢久服其效不泄真人保命丹酸棗仁人參白茯苓天門冬酒浸瓦上焙燥以上各三錢為末臨臥酒下三錢力可通霄鐵鉤丸熟地肉蓯蓉樟腦冰片各三錢滑石二錢海馬一對炙雄麻雀肉一個去嘴爪止取淨肉不可見水用鹽酒浸過焙乾為末以上各為末蜜丸桐子大每服三十丸乳香湯送下略飲酒少許服至九日玉莖漸長九日後則不衰矣許大師種子方歸身四兩鹿茸三兩淫羊藿八兩甘枸杞四兩仙茅八兩共為粗塊入絹袋內懸壇中入無灰酒二十斤用面封口重湯煮三炷香為度將藥取出曬乾為末煉蜜丸如桐子大酒埋地中七日退火氣每早晚空心飲酒數杯吞藥數十丸初服藥酒時戒房事二十一日至草一日之後隨飲行一月一泄探囊種子其效如神晚上必須服藥後方吃晚飯聚精丸黃魚膠白淨者一斤切碎用蛤粉炒成珠當歸身四兩白色者佳沙苑蒺藜八兩馬乳浸二宿隔酒蒸一炷香取起焙乾上為細末煉蜜丸如桐子大空心服每服八九丸溫酒滾水俱可下忌食魚並牛肉一方加蒺黎三兩舌底藏春好人參切作豆大用生雞蛋一枚搗孔出黃只留蛋清在內入參於中仍封固同放在哺小雞蛋筐中令母雞伏之俟小雞出時陰乾臨行事時將一片藏舌底下春意勃然不可名狀又方以一枝大參放入蛋中哺之三次以參含口內採戰不泄更妙千金一釐散人參歸身各四兩川椒二兩用水熬膏再加蟾酥四錢人乳拌浸四五次麝香一錢上藥攪勻收貯瓷器內封固不泄氣臨事用一釐搽頭上一個時辰方以溫水洗去然後行事其效不可殫述黑驢丸黑驢內外腎一副俱全用竹刀切薄片酒洗淨血水曬乾用桑葉或柳葉鋪蒸一炷香取起曬乾用陳壁土炒再埋地內一炷香取出研末大黃豆芽一斤童便煮熟曬乾京黃米八合炒黃黑芝麻八合炒石蓮肉六兩去心山藥八兩白茯苓四兩乳香三錢去油硃砂三錢上為細末用雄豬肚一個去油淨將前末藥裝在肚內蒸五炷香搗爛如泥丸如龍眼大曬乾臨晚酒下一丸如藥散難丸加蜜少許亦可暖爐解癢丸以吳茱萸裝滿牛膽內陰乾去膽皮將茱萸研末煉蜜為丸如龍眼小核大納陰戶可以解癢其暖如火補元起潛祕製神丸人參魚膠赤石脂拌炒枸杞子各八兩鹿茸酥炙透山萸肉炒杜仲炒斷絲為度韭子炒淫羊藿去邊羊油炙雄蠶蛾焙乾去頭足翅沙苑蒺藜鹿角膠各四兩赤何首烏各十兩切片此二者俱要大而鮮者黑豆九蒸九曬五加皮蔥子炒巴戟天肉野薔薇子淮生地肉蓯蓉酒洗鱗甲淨覆盆子各三兩大茴香一兩炒羚羊角四兩鏟末用破故紙六兩炒川牛膝酒洗焙乾益智炒遠志肉甘草水浸炒當歸身酒洗焙乾桑螵蛸焙乾各二兩黑驢內外腎一具全副用水洗淨黃酒煮熟切片新瓦焙乾為末不可爛黃狗內外腎五具全副用水洗淨黃酒煮熟切片新瓦焙乾為末不可爛鴿蛋百枚酒煮切片焙乾為末帶殼用大鱉頭一個連頸至甲邊切下微用酒煮乾為末哺退雞蛋七枚帶殼酒煮焙乾為末上三十七味各依法制為末煉蜜和鹿角膠為丸如梧子大每服三錢每早晚二服以酒送下至一月有奇驗若能久服弱體變強筋骨精壯服四十日即止故早晚二服也如得常服則晚不必服此係太內祕方外加海狗腎一具附子制好二兩其效更速又用人云鹿角膠一味換石斛四兩酒浸一宿蒸曬乾為末桑螵蛸當用四兩用桑葉煎湯拌濕過宿上下用桑葉鋪蓋蒸一炷香焙乾為末瘦長者方真種子宮神方生附子紫蘇甘草甘遂薄荷樟腦陽起石上七味各一錢共研細末用新瓦杯入藥末在內又蓋一新瓦杯上下合緊旋轉無縫用米醋調面封固其口入炭火內先試微火後加旺火煉一炷香其丹升於杯上去火存性即行取下外加麝香一分冰片一分蟾酥一分共研細末搗大蔥白取汁同蜜為丸如緑豆大以鉛粉為衣收干入錫瓶內黃蠟封口每於未申之時用一丸加津唾將丸於龜頭上擂丸為度不可入於馬口臨行時用溫水洗去然後行事出爐片刻復入即解此經久種子之良方也雙美丹母丁香二錢紫霄花三錢桃毛一錢麝香三分紫茄花鮮一兩曬乾真鴉片一錢白龍骨二錢火鍛石榴皮乾燥三錢鎖陽一兩酒浸三日曬乾上九味為末用白蜜為丸如芡實子大以右手中指入爐中少停交戰用九淺一深之法不用解即名美人一錠金也雀兒餅專治男子諸虛百損五勞七傷暖丹田添精髓壯元陽滋腎水種子之仙方也菟絲子不拘多少酒淨蒸一晝夜用好酒時時曬蒸爛取出搗成膏為餅焙乾為細末用雀卵清為丸如桐子大每日七十丸空心送下年至五十及痿者每菟絲子末一斤加天雄四兩附子制之得法則可若雲天雄則斷不可也以麵裹火煅熟削去皮臍切成四片童便浸透慢火焙乾入菟絲子末同服之尤妙神效洗方程梓園驗方鎖陽一錢陽起石二錢蓽茇一錢五分石榴皮五錢淫羊藿一錢紫霄花一錢五分蛇床子一錢生附子一錢長流水七碗煎三碗早晚洗如冷再熱再洗每日洗三五次陽事大起妙難盡述又洗陽方蛇床子地骨皮紫荊皮紫霄花防風甘松烏梅肉藿香川椒李相傳仇方痿加丁香三錢鴉片三錢九種藥等分各一兩研細末每一次將藥末一兩投入夜壺滾湯內用小竹籤攪勻浸陽物放入壺中二三刻候湯溫冷方止次晚將壺於銅鍋上溫熱如前浸洗七日後另換浸時洗更好制環方照前方用黑鉛三斤溶化投入前藥一種藥過取出冷定埋土一宿再溶化又入藥一種取出冷定埋土一宿如此九次九藥俱盡每種藥三兩足一圈次打成鉛條制環合前藥九種同煮鍋內定三炷香取出埋地一宿安在瓶內封固用時取出十精丸枸杞子天之精地黃地之精甘菊花日之精茯苓月之精人乳浸一宿天冬星之精菟絲子金之精肉蓯蓉水之精酒浸一宿川椒去子火之精山萸肉土之精官桂木之精各等分兩為末麵粉為丸如桐子大每服二十丸空心淡鹽湯送下此藥平淡無忌又無毒不問老少服之大有精神又緊乾妙方用緑皮生柿子剝皮來用不拘多少用好南酒浸透掛在無日色處風乾每一兩用五味子十粒生白礬四錢共研極細末以吐津為丸如圓眼大先一二時入爐內緊妙難言少加麝香杏花天方菟絲子蛇床子五味子陽名子各一兩為末酒糊丸緑豆大無有不效能治老人陽痿不堅功力最大引動春百花蕊曬乾一兩柳絮花三錢鬧羊花三錢紫霄花三錢麝香一分共研細